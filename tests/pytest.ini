[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
timeout = 60
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    bash_only: marks tests that only run against Bash implementation
    go_only: marks tests that only run against Go implementation
    integration: marks tests that require external services
